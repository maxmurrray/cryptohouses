<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CryptoHouses — Punk to House Converter</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0e0e0e;
  color: #eee;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  padding: 40px 24px;
}
h1 {

  letter-spacing: 4px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 4px;
}
.sub {
  font-size: 11px;
  color: #555;
  letter-spacing: 2px;
  margin-bottom: 48px;
}
.cards {
  display: flex;
  flex-wrap: wrap;
  gap: 48px;
  justify-content: flex-start;
}
.card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.conversion {
  display: flex;
  align-items: center;
  gap: 16px;
}
.punk-wrap, .house-wrap {
  border: 2px solid #333;
  line-height: 0;
  background: #638596;
  image-rendering: pixelated;
}
canvas {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  width: 168px;
  height: 168px;
}
.arrow {
  font-size: 20px;
  color: #444;
}
.punk-id {
  font-size: 13px;
  letter-spacing: 2px;
  color: #aaa;
}
.traits-row {
  font-size: 10px;
  color: #555;
  letter-spacing: 1px;
  text-align: center;
}
.palette {
  display: flex;
  gap: 6px;
  align-items: center;
}
.swatch {
  width: 18px;
  height: 18px;
  border: 1px solid #222;
  position: relative;
}
.swatch-label {
  position: absolute;
  bottom: -16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 8px;
  color: #555;
  white-space: nowrap;
  letter-spacing: 0;
}
.palette-wrap {
  display: flex;
  gap: 16px;
  align-items: flex-end;
  padding-bottom: 20px;
}
.palette-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.zone-label {
  font-size: 8px;
  color: #444;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.divider {
  width: 100%;
  border-top: 1px solid #1a1a1a;
  margin: 48px 0 32px;
}
.section-title {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #444;
  margin-bottom: 24px;
}
</style>
</head>
<body>

<h1>🏠 CryptoHouses</h1>
<div class="sub">Every punk becomes a house — same pixels, new architecture</div>

<div class="cards" id="cards"></div>

<div class="divider"></div>
<div class="section-title">Try any punk</div>
<div style="display:flex;gap:12px;align-items:center;margin-bottom:24px">
  <input id="punkInput" type="number" min="0" max="9999" placeholder="Punk ID (0–9999)"
    style="background:#111;border:1px solid #333;color:#eee;padding:8px 12px;font-family:monospace;font-size:13px;width:220px;outline:none">
  <button onclick="loadPunk()" 
    style="background:#1a1a1a;border:1px solid #333;color:#aaa;padding:8px 20px;font-family:monospace;font-size:12px;cursor:pointer;letter-spacing:2px">
    CONVERT
  </button>
</div>
<div id="dynamic" style="display:flex;gap:48px;flex-wrap:wrap"></div>

<script>
// ─── PUNK COLOR DATA (pre-extracted) ──────────────────────────────────────
const PUNKS = {
  3355: {
    b64: "iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAA80lEQVR4nGNgGAXDHjASoeY/JfoJKfh/yk8Qp6TZpvcEzWAi13AGBgYGqDw+H+K0/f9kc068hiOD3JPfcZqFzwcM5uIcRNH4AL7w+397YwNBA1T9G/Caw0LQBAYGhtN71zAwMDAwmDqHYIgRAriCCMX1UZOuMOjom6AowCaGDRDlA2xBRUzwMTDgiWRo2FIMcFnAyMDAwLDv9E2sFpNiOcEg2nf6JoOTqTqcjxw02BxAsgXEGkSRBTDQP38DnF2YGEC5BU6m6iiuJ9ZQZIC3qIBZgguktyxnYCBQmhIVRE6m6rhSDsH6gKQ4IMZAdEAwiCgFALpWPhxcvabMAAAAAElFTkSuQmCC",
    traits: "Male · Orange Knit Cap · Normal Beard",
    type: "cottage"
  },
  100: {
    b64: "iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAA/klEQVR4nGNgGGngPxQTDZhIMjy0gUFpAtwiqoL/DKEN/5UmINFUtgTV8NAGqlqAYTg1LcFpOLUswWs4MXHBSMBwBiXrBpwK7h2FyN8rwG0WXgugSZKh53ciVgUlrPMhFuGxgGA+wGU4ITkYYCGogoGB4cbZvQwMDAwMGsbOGGIMFvj1EpWTq1Y8YlBU0SQohg0Q5YN13ZhBgU0MGyClLCILkGxBUOl82lpAbNDAAFFxAAMbJ62As/3zIojSgyujwTMZAwPhjMbAgDuz4QoiRqgGmEaMsA8qnc+ApobkooKBAVqQwcIdzRJGJDU4zSEUySgakSKYEZcaUi2gGAAAbm19jL2zDYQAAAAASUVORK5CYII=",
    traits: "Male · Green Mohawk · 3D Glasses",
    type: "townhouse"
  },
  42: {
    b64: "iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAABEElEQVR4nOWUPQ6CQBCFH8ZCSxNLsOEgXMUTQDiBeAIDiUew8QD2NlzAShIqJHReASvI/szuDmjnSzYks/C9fbPLAv+s/pcAFWabk7SwwD0DSHzajEkDG5AEEIuSpBUcEJc0ni3BHDlbRCWaou8TpFGANApYcNXACBehp3sz1tTF1XWdcVwlI8NqRw2GAJAkCfI8l5isFrVdg7ZrnLU4jo/qt9SPpqW6VoC/WTtrlKhTpKVIowD9auusFUVxcBmIRlPlzW6RKHFTVYVhmHFh42VnOkUWI4m55Lw06Pl4AQBu7x5lWWrz/nmP3aWSLj1Or8kU3ASmTeYCPWJIMrVIUxoFqgnrpLETDCZT4JMN5ugDSE5eiNpap9gAAAAASUVORK5CYII=",
    traits: "Ape · Earring",
    type: "haunted"
  }
};

// ─── COLOR EXTRACTION FROM PUNK CANVAS ────────────────────────────────────
function extractColors(imgCanvas) {
  const ctx = imgCanvas.getContext('2d');
  const data = ctx.getImageData(0, 0, 24, 24).data;

  const top = {}, mid = {}, bot = {};

  for (let y = 0; y < 24; y++) {
    for (let x = 0; x < 24; x++) {
      const i = (y * 24 + x) * 4;
      const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
      if (a < 128) continue; // transparent
      const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
      if (hex === '#000000') continue; // skip outlines

      const bucket = y < 10 ? top : y < 18 ? mid : bot;
      bucket[hex] = (bucket[hex] || 0) + 1;
    }
  }

  const top1 = dominant(top, 0), top2 = dominant(top, 1);
  const mid1 = dominant(mid, 0), mid2 = dominant(mid, 1);
  const bot1 = dominant(bot, 0);

  return {
    roof1: top1 || mid1,
    roof2: top2 || top1,
    wall1: mid1,
    wall2: mid2 || bot1,
    body1: bot1 || mid1,
  };
}

function dominant(obj, rank) {
  const sorted = Object.entries(obj).sort((a,b) => b[1]-a[1]);
  return sorted[rank] ? sorted[rank][0] : null;
}

// ─── HOUSE DRAWING ENGINE ─────────────────────────────────────────────────
function fill(ctx, x, y, w, h, col) {
  if (!col) return;
  ctx.fillStyle = col;
  ctx.fillRect(x, y, w, h);
}
function px(ctx, x, y, col) { fill(ctx, x, y, 1, 1, col); }

function darken(hex, amount) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, (n >> 16) - amount);
  const g = Math.max(0, ((n >> 8) & 0xFF) - amount);
  const b = Math.max(0, (n & 0xFF) - amount);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function drawHouse(c, colors, type) {
  const ctx = c.getContext('2d');
  const { roof1, roof2, wall1, wall2, body1 } = colors;
  const outline = '#000000';
  const sky = '#638596';
  const win = lighten(wall1, 40);
  const winDark = darken(wall1, 20);

  // Clear
  fill(ctx, 0, 0, 24, 24, sky);

  if (type === 'haunted') {
    drawHauntedHouse(ctx, colors, outline, sky);
  } else if (type === 'townhouse') {
    drawTownHouse(ctx, colors, outline, win, winDark);
  } else {
    drawCottageHouse(ctx, colors, outline, win, winDark);
  }
}

function lighten(hex, amount) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (n >> 16) + amount);
  const g = Math.min(255, ((n >> 8) & 0xFF) + amount);
  const b = Math.min(255, (n & 0xFF) + amount);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function drawCottageHouse(ctx, { roof1, roof2, wall1, wall2, body1 }, outline, win, winDark) {
  // Chimney
  fill(ctx, 16, 5, 2, 9, body1);
  fill(ctx, 15, 5, 1, 9, darken(body1, 30));
  px(ctx, 16, 3, lighten(body1, 60));
  px(ctx, 17, 2, lighten(body1, 80));

  // Pitched roof - peak at x=12, y=7, base width 15 at y=13
  for (let r = 0; r < 7; r++) {
    const lx = Math.round(12 - r * 1.2);
    const rx = Math.round(12 + r * 1.2);
    fill(ctx, lx, 7 + r, rx - lx + 1, 1, r % 2 === 0 ? roof1 : roof2);
  }
  // Eave
  fill(ctx, 4, 13, 16, 1, roof2);
  fill(ctx, 4, 14, 16, 1, darken(roof2, 20));

  // Main wall x=5-18, y=14-21
  fill(ctx, 5, 14, 13, 8, wall1);
  fill(ctx, 17, 14, 1, 8, darken(wall1, 20));
  // Lower accent strip (body color = shirt)
  fill(ctx, 5, 19, 13, 3, wall2);
  fill(ctx, 17, 19, 1, 3, darken(wall2, 20));

  // Windows
  drawWin(ctx, 6, 15, win, winDark, wall1);
  drawWin(ctx, 14, 15, win, winDark, wall1);

  // Door (centered, using body color)
  fill(ctx, 11, 17, 3, 5, body1);
  fill(ctx, 10, 17, 1, 5, darken(body1, 20)); // door shadow
  px(ctx, 13, 19, lighten(body1, 80)); // knob

  // Ground
  fill(ctx, 0, 22, 24, 1, darken(wall2, 20));
  fill(ctx, 0, 23, 24, 1, darken(wall2, 10));
  fill(ctx, 10, 22, 4, 2, darken(wall2, 40)); // path
}

function drawTownHouse(ctx, { roof1, roof2, wall1, wall2, body1 }, outline, win, winDark) {
  // Chimney
  fill(ctx, 8, 4, 2, 7, body1);
  fill(ctx, 7, 4, 1, 7, darken(body1, 30));
  px(ctx, 8, 2, lighten(body1, 60));
  px(ctx, 9, 3, lighten(body1, 80));

  // Mansard roof
  fill(ctx, 7, 7, 10, 3, roof1);
  fill(ctx, 6, 9, 12, 1, roof2);
  fill(ctx, 7, 10, 10, 2, roof2);
  fill(ctx, 6, 11, 12, 1, darken(roof2, 20));

  // Walls x=7-16, y=11-21
  fill(ctx, 7, 11, 10, 11, wall1);
  fill(ctx, 16, 11, 1, 11, darken(wall1, 20));

  // Body color stripe (floor divide)
  fill(ctx, 7, 16, 10, 1, wall2);

  // Upper windows
  drawWin(ctx, 8, 12, win, winDark, wall1);
  drawWin(ctx, 13, 12, win, winDark, wall1);

  // Lower windows
  drawWin(ctx, 8, 17, win, winDark, wall1);
  drawWin(ctx, 13, 17, win, winDark, wall1);

  // Door (body color)
  fill(ctx, 10, 17, 4, 5, body1);
  px(ctx, 13, 20, lighten(body1, 80));

  // Steps
  fill(ctx, 9, 21, 6, 1, wall2);
  fill(ctx, 10, 22, 4, 1, darken(wall2, 20));

  // Ground
  fill(ctx, 0, 22, 24, 1, darken(wall2, 30));
  fill(ctx, 0, 23, 24, 1, darken(wall2, 20));
  fill(ctx, 10, 22, 4, 2, darken(wall2, 50));
}

function drawHauntedHouse(ctx, { roof1, roof2, wall1, wall2, body1 }, outline, sky) {
  // Override sky to dark
  fill(ctx, 0, 0, 24, 24, '#1a1520');

  // Moon (subtle)
  fill(ctx, 1, 1, 3, 3, '#eeeecc');
  px(ctx, 1, 1, '#1a1520');
  px(ctx, 1, 2, '#1a1520');

  // Bat
  px(ctx, 18, 3, '#333'); px(ctx, 19, 2, '#333'); px(ctx, 20, 3, '#333');

  // Main spire tower x=10-13
  fill(ctx, 10, 8, 4, 14, wall1);
  fill(ctx, 10, 8, 1, 14, darken(wall1, 30));
  px(ctx, 11, 6, roof1);
  fill(ctx, 10, 7, 3, 1, roof1);
  fill(ctx, 10, 8, 4, 1, roof2);

  // Right turret x=17-21
  fill(ctx, 17, 10, 5, 12, wall2 || wall1);
  fill(ctx, 17, 10, 1, 12, darken(wall1, 40));
  px(ctx, 19, 7, roof1);
  fill(ctx, 18, 8, 3, 1, roof2);
  fill(ctx, 17, 9, 5, 1, roof2);

  // Left wing x=3-10
  fill(ctx, 3, 12, 8, 10, wall1);
  fill(ctx, 3, 12, 1, 10, darken(wall1, 30));
  fill(ctx, 4, 10, 5, 2, roof1);
  fill(ctx, 4, 10, 1, 2, roof2);
  px(ctx, 6, 9, roof2);

  // Spooky windows (yellow glow from wall color lightened)
  const spook = lighten(body1, 80);
  fill(ctx, 4, 13, 3, 3, darken(body1, 10));
  fill(ctx, 5, 13, 1, 3, spook);
  fill(ctx, 4, 14, 3, 1, spook);

  fill(ctx, 7, 13, 3, 3, darken(body1, 10));
  fill(ctx, 8, 13, 1, 3, spook);
  fill(ctx, 7, 14, 3, 1, spook);

  // Turret windows
  px(ctx, 19, 11, spook); px(ctx, 19, 13, spook); px(ctx, 19, 15, spook);

  // Gothic door
  fill(ctx, 5, 17, 4, 5, darken(wall1, 60));
  fill(ctx, 5, 16, 4, 1, darken(wall1, 50));
  px(ctx, 6, 19, '#333'); px(ctx, 7, 19, '#333');

  // Dead ground
  fill(ctx, 0, 22, 24, 1, '#222816');
  fill(ctx, 0, 23, 24, 1, '#1a1e0a');
  fill(ctx, 5, 22, 4, 2, '#111');
}

function drawWin(ctx, x, y, win, winDark, wall) {
  fill(ctx, x, y, 3, 3, darken(wall, 30)); // frame
  fill(ctx, x+1, y, 1, 3, win);
  fill(ctx, x, y, 1, 3, winDark);
  fill(ctx, x+2, y, 1, 3, lighten(win, 20));
}

// ─── CARD BUILDER ─────────────────────────────────────────────────────────
function buildCard(punkId, data) {
  const card = document.createElement('div');
  card.className = 'card';

  // Load punk image onto offscreen canvas to extract colors
  const punkCanvas = document.createElement('canvas');
  punkCanvas.width = 24; punkCanvas.height = 24;
  const punkCtx = punkCanvas.getContext('2d');

  const img = new Image();
  img.onload = function() {
    punkCtx.drawImage(img, 0, 0, 24, 24);
    const colors = data.colors || extractColors(punkCanvas);

    // Display punk (scaled)
    const punkDisplay = document.createElement('canvas');
    punkDisplay.width = 168; punkDisplay.height = 168;
    const pdCtx = punkDisplay.getContext('2d');
    pdCtx.imageSmoothingEnabled = false;
    pdCtx.drawImage(punkCanvas, 0, 0, 168, 168);

    // Draw house
    const houseCanvas = document.createElement('canvas');
    houseCanvas.width = 24; houseCanvas.height = 24;
    drawHouse(houseCanvas, colors, data.type || 'cottage');

    const houseDisplay = document.createElement('canvas');
    houseDisplay.width = 168; houseDisplay.height = 168;
    const hdCtx = houseDisplay.getContext('2d');
    hdCtx.imageSmoothingEnabled = false;
    hdCtx.drawImage(houseCanvas, 0, 0, 168, 168);

    const punkWrap = document.createElement('div');
    punkWrap.className = 'punk-wrap';
    punkWrap.appendChild(punkDisplay);

    const houseWrap = document.createElement('div');
    houseWrap.className = 'house-wrap';
    if (data.type === 'haunted') houseWrap.style.background = '#1a1520';
    houseWrap.appendChild(houseDisplay);

    const arrow = document.createElement('div');
    arrow.className = 'arrow';
    arrow.textContent = '→';

    const conv = document.createElement('div');
    conv.className = 'conversion';
    conv.append(punkWrap, arrow, houseWrap);

    const id = document.createElement('div');
    id.className = 'punk-id';
    id.textContent = `Punk #${punkId}`;

    const traits = document.createElement('div');
    traits.className = 'traits-row';
    traits.textContent = data.traits || '';

    // Color palette
    const palWrap = document.createElement('div');
    palWrap.className = 'palette-wrap';
    const zones = [
      { label: 'ROOF', cols: [colors.roof1, colors.roof2] },
      { label: 'WALLS', cols: [colors.wall1, colors.wall2] },
      { label: 'TRIM', cols: [colors.body1] },
    ];
    zones.forEach(z => {
      const zone = document.createElement('div');
      zone.className = 'palette-zone';
      const zlbl = document.createElement('div');
      zlbl.className = 'zone-label';
      zlbl.textContent = z.label;
      const row = document.createElement('div');
      row.className = 'palette';
      z.cols.filter(Boolean).forEach(col => {
        const sw = document.createElement('div');
        sw.className = 'swatch';
        sw.style.background = col;
        sw.title = col;
        row.appendChild(sw);
      });
      zone.append(zlbl, row);
      palWrap.appendChild(zone);
    });

    card.append(conv, id, traits, palWrap);
  };
  img.src = 'data:image/png;base64,' + data.b64;

  return card;
}

// ─── LOAD PRE-EXTRACTED PUNKS ─────────────────────────────────────────────
const preExtracted = {
  3355: { roof1:'#ca4e11', roof2:'#933709', wall1:'#dbb180', wall2:'#997c59', body1:'#997c59' },
  100:  { roof1:'#229000', roof2:'#005580', wall1:'#ae8b61', wall2:'#229000', body1:'#ae8b61' },
  42:   { roof1:'#713f1d', roof2:'#713f1d', wall1:'#713f1d', wall2:'#dddddd', body1:'#713f1d' },
};

const container = document.getElementById('cards');
[3355, 100, 42].forEach(id => {
  const data = { ...PUNKS[id], colors: preExtracted[id] };
  container.appendChild(buildCard(id, data));
});

// ─── DYNAMIC LOADER ───────────────────────────────────────────────────────
async function loadPunk() {
  const id = parseInt(document.getElementById('punkInput').value);
  if (isNaN(id) || id < 0 || id > 9999) return;

  const dynContainer = document.getElementById('dynamic');
  dynContainer.innerHTML = '<div style="color:#555;font-size:12px;letter-spacing:2px">LOADING...</div>';

  try {
    // Try to load via CORS proxy
    const proxyUrl = `https://corsproxy.io/?https://www.larvalabs.com/public/images/cryptopunks/punk${String(id).padStart(4,'0')}.png`;
    const res = await fetch(proxyUrl);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const img = new Image();
    img.onload = function() {
      const tmpC = document.createElement('canvas');
      tmpC.width = 24; tmpC.height = 24;
      const tmpCtx = tmpC.getContext('2d');
      tmpCtx.drawImage(img, 0, 0, 24, 24);

      const colors = extractColors(tmpC);

      // Guess type from colors
      let type = 'cottage';
      const allDark = [colors.roof1, colors.wall1, colors.body1].every(c => {
        const n = parseInt(c.slice(1), 16);
        const brightness = ((n>>16)*0.299 + ((n>>8)&0xFF)*0.587 + (n&0xFF)*0.114);
        return brightness < 80;
      });
      if (allDark) type = 'haunted';
      else if (Math.random() > 0.5) type = 'townhouse';

      const buf = [];
      tmpC.toBlob(blob2 => {
        const reader = new FileReader();
        reader.onload = e => {
          const b64 = e.target.result.split(',')[1];
          dynContainer.innerHTML = '';
          dynContainer.appendChild(buildCard(id, { b64, traits: `Punk #${id}`, type, colors }));
        };
        reader.readAsDataURL(blob2);
      });
    };
    img.src = url;
  } catch(e) {
    dynContainer.innerHTML = `<div style="color:#555;font-size:11px">Could not load punk #${id} — CORS proxy unavailable</div>`;
  }
}

document.getElementById('punkInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadPunk();
});
</script>
